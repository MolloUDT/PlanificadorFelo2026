<style>
  /* --- Global Scrollbar Styling (Slate Theme) --- */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  
  ::-webkit-scrollbar-thumb {
    background: #cbd5e1; /* slate-300 */
    border-radius: 4px;
    border: 2px solid transparent; /* Creates padding effect */
    background-clip: content-box;
  }
  
  ::-webkit-scrollbar-thumb:hover {
    background-color: #94a3b8; /* slate-400 */
  }

  /* --- Brand Custom Scrollbar (Emerald Theme) --- */
  /* Utilizado en el Timeline y paneles grandes */
  .custom-scrollbar::-webkit-scrollbar {
    width: 12px;
    height: 12px;
  }

  .custom-scrollbar::-webkit-scrollbar-track {
    background: #f0fdf4; /* emerald-50 */
    border-radius: 8px;
  }

  .custom-scrollbar::-webkit-scrollbar-thumb {
    background-color: #6ee7b7; /* emerald-300 */
    border-radius: 8px;
    border: 3px solid #f0fdf4; /* Matches track for rounded feel */
    background-clip: content-box;
  }

  .custom-scrollbar::-webkit-scrollbar-thumb:hover {
    background-color: #34d399; /* emerald-400 */
    border-color: #ecfdf5;
  }

  .custom-scrollbar::-webkit-scrollbar-corner {
    background: transparent;
  }

  /* Firefox Support */
  .custom-scrollbar {
    scrollbar-width: thin;
    scrollbar-color: #6ee7b7 #f0fdf4;
  }
</style>
<link rel="stylesheet" href="/index.css">
</head>
